name: Artifacts bilan ishlash

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-va-yuklash:
    runs-on: ubuntu-latest
    steps:
      - name: Kodni yuklab olish
        uses: actions/checkout@v4

      - name: Fayl yaratish
        run: |
          echo "Bu fayl GitHub Actions tomonidan yaratildi." > natija.txt
          echo "Yaratilgan vaqti: $(date)" >> natija.txt

      - name: Faylni Artifact sifatida saqlash
        uses: actions/upload-artifact@v4
        with:
          name: mening-faylim
          path: natija.txt
